<!DOCTYPE html>
<html>
<body style="background:black; color:white; text-align:center;">

<h2>Select Camera</h2>

<!-- Live Camera Preview -->
<video id="preview" autoplay playsinline style="width:100%; max-width:600px; border:2px solid white;"></video>

<!-- Camera Selector -->
<select id="cameraSelect" style="margin-top:15px; padding:10px; width:100%; max-width:600px;"></select>

<!-- Manual Permission Button (iPhone requires user gesture) -->
<button id="initCameraBtn" style="margin-top:20px; padding:12px; width:100%; max-width:600px;">
  Tap to Enable Camera
</button>

<script src="/ws.js"></script>

<script>
let currentStream = null;
let mediaRecorder = null;
let recordedChunks = [];

const ws = window.ws;

/* ---------------------------------------------------
   IDENTIFY AS CAMERA DEVICE
--------------------------------------------------- */
ws.addEventListener("open", () => {
  ws.send(JSON.stringify({
    type: "identify",
    device: "camera"
  }));
});

/* ---------------------------------------------------
   AUTO START WHEN DESKTOP ACTIVATES CAMERA
--------------------------------------------------- */
ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);

  if (data.type === "activate-camera") {
    autoStartCamera();
  }

  if (data.type === "startClip") startClip();
  if (data.type === "stopClip") stopClip();
};

/* ---------------------------------------------------
   AUTO CAMERA START (desktop-triggered)
--------------------------------------------------- */
async function autoStartCamera() {
  try {
    await requestCameraPermission();
    await loadCameras();
    document.getElementById("initCameraBtn").style.display = "none";
  } catch (err) {
    console.error("Auto camera start failed:", err);
  }
}

/* ---------------------------------------------------
   MANUAL CAMERA START (user-triggered)
--------------------------------------------------- */
document.getElementById("initCameraBtn").addEventListener("click", async () => {
  await requestCameraPermission();
  await loadCameras();
  document.getElementById("initCameraBtn").style.display = "none";
});

/* ---------------------------------------------------
   REQUEST CAMERA PERMISSION
--------------------------------------------------- */
async function requestCameraPermission() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
  } catch (err) {
    alert("Camera permission blocked. Enable it in browser settings.");
    console.error(err);
  }
}

/* ---------------------------------------------------
   LOAD CAMERA DEVICES
--------------------------------------------------- */
async function loadCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cameras = devices.filter(d => d.kind === "videoinput");

  const select = document.getElementById("cameraSelect");
  select.innerHTML = "";

  cameras.forEach((cam, index) => {
    const option = document.createElement("option");
    option.value = cam.deviceId;
    option.textContent = cam.label || `Camera ${index + 1}`;
    select.appendChild(option);
  });

  startCamera(select.value);
}

/* ---------------------------------------------------
   START CAMERA STREAM
--------------------------------------------------- */
async function startCamera(deviceId) {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
  }

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { deviceId: deviceId ? { exact: deviceId } : undefined }
  });

  currentStream = stream;

  const video = document.getElementById("preview");
  video.srcObject = stream;
}

/* ---------------------------------------------------
   SWITCH CAMERA
--------------------------------------------------- */
document.getElementById("cameraSelect").addEventListener("change", (e) => {
  startCamera(e.target.value);
});

/* ---------------------------------------------------
   START RECORDING
--------------------------------------------------- */
async function startClip(pitchId) {
  currentPitchId = pitchId;

if (data.type === "startClip") startClip(data.pitchId);

  if (!currentStream) return;

  recordedChunks = [];
  mediaRecorder = new MediaRecorder(currentStream, { mimeType: "video/webm" });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(recordedChunks, { type: "video/webm" });
    const formData = new FormData();
    formData.append("clip", blob, "clip.webm");

    const res = await fetch("/uploadClip", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    ws.send(JSON.stringify({
  type: "clip",
  pitchId: currentPitchId,
  url: data.url
}));
  };

  mediaRecorder.start();
}

/* ---------------------------------------------------
   STOP RECORDING
--------------------------------------------------- */
function stopClip() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}
</script>

</body>
</html>
