<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sessions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Saved Sessions</h1>

  <div id="sessionList" class="session-list"></div>
  <strong>${session.pitcher}</strong><br>


  <button onclick="window.location.href='tagging.html'" class="back-btn">
    ← Back to Tagging
  </button>

  <button onclick="window.location.href='pitcher-dashboard.html?pitcher=${session.pitcher}'">
  Pitcher Analytics
</button>


  <script>
    async function loadSessions() {
      const res = await fetch('/list-sessions');
      const files = await res.json();

      const container = document.getElementById('sessionList');
      container.innerHTML = '';

      for (const file of files) {
        const sessionRes = await fetch(`/sessions/${file}`);
        const session = await sessionRes.json();

        const div = document.createElement('div');
        div.className = 'session-item';

        div.innerHTML = `
          <strong>${session.pitcher || 'Unknown Pitcher'}</strong><br>
          ${session.pitches.length} pitches<br>
          <button onclick="openSession('${file}')">Open</button>
        `;

        container.appendChild(div);
      }
    }

    function openSession(file) {
      window.location.href = `viewer.html?file=${file}`;
    }

    loadSessions();
  </script>
</body>
</html>
