<!DOCTYPE html>
<html>
<head>
  <title>Select Role</title>
</head>
<body>
  <div id="statusBar" style="padding:10px; background:#eee; font-weight:bold;">
    Camera: ❌ | Tagger: ❌
  </div>

  <h1>Select Role</h1>

  <button id="taggerBtn">Tagger</button>
  <button id="cameraBtn">Camera</button>

  <script src="/ws.js"></script>

  <script>
    async function setRole(role) {
      const res = await fetch("/setRole", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role })
      });

      const data = await res.json();
      if (!data.success) return alert("Error setting role");

      if (role === "tagger") window.location.href = "/tagging.html";
      if (role === "camera") window.location.href = "/pitcher-dashboard.html";
    }

    document.getElementById("taggerBtn").onclick = () => setRole("tagger");
    document.getElementById("cameraBtn").onclick = () => setRole("camera");
  </script>
</body>
</html>
