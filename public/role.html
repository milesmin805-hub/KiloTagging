<!DOCTYPE html>
<html>
<body style="background:black; color:white; text-align:center;">

<h2>Select Device Role</h2>

<button onclick="setRole('camera')" 
        style="padding:15px; margin:10px; width:80%; max-width:300px;">
    Use this device as CAMERA
</button>

<button onclick="setRole('tagger')" 
        style="padding:15px; margin:10px; width:80%; max-width:300px;">
    Use this device as TAGGER
</button>

<script>
async function setRole(role) {
    const res = await fetch("/setRole", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role })
    });

    const data = await res.json();

    if (data.success) {
        if (role === "camera") {
            window.location.href = "/camera.html";
        } else {
            window.location.href = "/tagging.html";
        }
    } else {
        alert("Error setting role");
    }
}
</script>

</body>
</html>
