<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kilo - Upload CSV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050816;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 55%);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #22d3ee, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
    }

    .brand-text .title {
      font-size: 16px;
      font-weight: 600;
    }

    .brand-text .subtitle {
      font-size: 11px;
      color: #9ca3af;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .back-btn {
      padding: 8px 12px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s ease;
    }

    .back-btn:hover {
      border-color: rgba(56, 189, 248, 0.9);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
    }

    main {
      flex: 1;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), #020617);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #22d3ee;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
    }

    input[type="text"],
    input[type="file"] {
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.9);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
    }

    input[type="file"]::file-selector-button {
      padding: 8px 12px;
      background: rgba(56, 189, 248, 0.2);
      border: 1px solid rgba(56, 189, 248, 0.5);
      color: #22d3ee;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      margin-right: 12px;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(56, 189, 248, 0.3);
    }

    .upload-area {
      border: 2px dashed rgba(56, 189, 248, 0.3);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      transition: all 0.15s ease;
      cursor: pointer;
      background: rgba(56, 189, 248, 0.05);
    }

    .upload-area:hover {
      border-color: rgba(56, 189, 248, 0.6);
      background: rgba(56, 189, 248, 0.1);
    }

    .upload-area.dragover {
      border-color: rgba(56, 189, 248, 0.9);
      background: rgba(56, 189, 248, 0.2);
    }

    .upload-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 13px;
      color: #9ca3af;
    }

    .upload-text strong {
      color: #22d3ee;
      display: block;
      margin-bottom: 4px;
    }

    button {
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: radial-gradient(circle at top left, #22d3ee, #0f172a);
      color: #000;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      width: 100%;
    }

    button:hover {
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.7);
      border-color: rgba(56, 189, 248, 1);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      margin-bottom: 16px;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.5);
      color: #86efac;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }

    .status.loading {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.5);
      color: #7dd3fc;
    }

    .file-input-hidden {
      display: none;
    }

    @media (max-width: 600px) {
      main {
        padding: 12px;
      }

      .card {
        padding: 16px;
      }

      .upload-area {
        padding: 20px;
      }

      .upload-icon {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="goHome()">
      <div class="brand-mark">⚾</div>
      <div class="brand-text">
        <div class="title">Kilo</div>
        <div class="subtitle">Baseball</div>
      </div>
    </div>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </header>

  <main>
    <div class="card">
      <div class="card-title">Create New Session</div>

      <div class="form-group">
        <label>Session Name</label>
        <input 
          id="sessionName" 
          type="text" 
          placeholder="e.g., Game vs Central High"
          value=""
        />
      </div>

      <button onclick="createSessionForCSV()">Create & Continue</button>
    </div>

    <div class="card">
      <div class="card-title">Upload Trackman CSV</div>

      <div id="status" class="status"></div>

      <div class="form-group">
        <label>Select CSV File</label>
        <div 
          class="upload-area" 
          id="uploadArea"
          ondrop="handleDrop(event)"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave(event)"
        >
          <div class="upload-icon">📁</div>
          <div class="upload-text">
            <strong>Click to select or drag CSV file</strong>
            Trackman, Rapsodo, or GameChanger CSV
          </div>
        </div>
        <input 
          id="csvFile" 
          type="file" 
          accept=".csv"
          class="file-input-hidden"
          multiple
          onchange="handleFileSelect(event)"
        />
      </div>

      <button id="uploadBtn" onclick="uploadCSV()" disabled>Upload CSV</button>
    </div>
    
    <!-- Past CSV Imports Section -->
      <div class="card">
        <div class="card-title" id="pastImportsTitle" style="display: none;">Past CSV Uploads</div>
        <div id="pastImports" style="display: none;">
          <div id="importsList" style="display: grid; gap: 12px;">
            <!-- Populated by JavaScript -->
          </div>
        </div>

        <!-- No imports message -->
        <div id="noImports" style="display: none; text-align: center; color: #9ca3af; padding: 20px;">
          <p>No CSV uploads yet for this session</p>
        </div>
      </div>
    </main>

  <script>
    let selectedFiles = [];
    let selectedFile = null;
    let currentSessionId = null;

    // Auth check
    window.addEventListener("load", () => {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "/login.html";
      }
    });

    // Drag and drop
    const uploadArea = document.getElementById("uploadArea");
    const csvFileInput = document.getElementById("csvFile");

    uploadArea.addEventListener("click", () => csvFileInput.click());

    function handleDragOver(e) {
      e.preventDefault();
      uploadArea.classList.add("dragover");
    }

    function handleDragLeave(e) {
      e.preventDefault();
      uploadArea.classList.remove("dragover");
    }

    function handleDrop(e) {
      e.preventDefault();
      uploadArea.classList.remove("dragover");
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        csvFileInput.files = files;
        handleFileSelect({ target: { files } });
      }
    }

  function handleFileSelect(e) {
      const files = e.target.files;
      if (files.length > 0) {
        selectedFiles = Array.from(files);
        document.getElementById("uploadBtn").disabled = false;
        const fileNames = selectedFiles.map(f => f.name).join(", ");
        showStatus(`Selected: ${fileNames} (${files.length} file${files.length > 1 ? 's' : ''})`, "success");
      }
    }

    // Create session
    async function createSessionForCSV() {
      const sessionName = document.getElementById("sessionName").value.trim();
      
      if (!sessionName) {
        showStatus("Please enter a session name", "error");
        return;
      }

      const token = localStorage.getItem("token");

      try {
        const res = await fetch("/session/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, name: sessionName })
        });

        const data = await res.json();

        if (!data.success) {
          showStatus("Failed to create session: " + data.error, "error");
          return;
        }

        currentSessionId = data.sessionId;
        document.getElementById("sessionName").disabled = true;
        showStatus("Session created! Now upload a CSV.", "success");
      } catch (err) {
        showStatus("Error: " + err.message, "error");
      }
    }

    // Upload CSV
async function uploadCSV() {
      if (!selectedFiles || selectedFiles.length === 0) {
        showStatus("Please select CSV file(s)", "error");
        return;
      }

      if (!currentSessionId) {
        showStatus("Please create a session first", "error");
        return;
      }

      const token = localStorage.getItem("token");
      showStatus(`Uploading ${selectedFiles.length} file(s)...`, "loading");
      document.getElementById("uploadBtn").disabled = true;

      try {
        for (let i = 0; i < selectedFiles.length; i++) {
          const formData = new FormData();
          formData.append("csv", selectedFiles[i]);
          formData.append("sessionId", currentSessionId);
          formData.append("token", token);

          const res = await fetch("/upload-csv", {
            method: "POST",
            body: formData
          });

          const data = await res.json();

          if (!data.success) {
            showStatus(`File ${i + 1} failed: ` + data.error, "error");
            document.getElementById("uploadBtn").disabled = false;
            return;
          }

          showStatus(`Uploaded ${i + 1}/${selectedFiles.length} files...`, "loading");
        }

        showStatus("All CSVs uploaded! Pitchers parsed.", "success");
        
        // Redirect to pitcher selection page
        setTimeout(() => {
          window.location.href = `/pitcher-select.html?sessionId=${currentSessionId}`;
        }, 1500);

      } catch (err) {
        showStatus("Error: " + err.message, "error");
        document.getElementById("uploadBtn").disabled = false;
      }
    }

    function showStatus(msg, type) {
      const status = document.getElementById("status");
      status.textContent = msg;
      status.className = `status show ${type}`;
    }

    function goHome() {
      window.location.href = "/dashboard.html";
    }

    function goBack() {
      window.location.href = "/dashboard.html";
    }

    // Load and display past CSV imports
    async function loadPastImports() {
      if (!currentSessionId) return;

      try {
        const token = localStorage.getItem("token");
        const response = await fetch(`/session/${currentSessionId}/csv-imports?token=${token}`);
        const data = await response.json();

        if (!data.success || data.imports.length === 0) {
          document.getElementById("noImports").style.display = "block";
          document.getElementById("pastImports").style.display = "none";
          document.getElementById("pastImportsTitle").style.display = "none";
          return;
        }

        document.getElementById("pastImportsTitle").style.display = "block";
        document.getElementById("pastImports").style.display = "block";
        document.getElementById("noImports").style.display = "none";

        const importsList = document.getElementById("importsList");
        importsList.innerHTML = data.imports.map(imp => {
          const date = new Date(imp.uploadedAt);
          const dateStr = date.toLocaleDateString() + " " + date.toLocaleTimeString();

          return `
            <div style="background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(148, 163, 184, 0.3); padding: 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <div style="color: #22d3ee; font-weight: 600; margin-bottom: 4px;">${dateStr}</div>
                <div style="color: #9ca3af; font-size: 12px;">
                  ${imp.pitchCount} pitches from ${imp.pitcherCount} pitcher${imp.pitcherCount !== 1 ? 's' : ''}
                </div>
              </div>
              <button onclick="deleteImport('${imp.id}')" style="padding: 8px 12px; background: rgba(252, 165, 165, 0.2); border: 1px solid rgba(252, 165, 165, 0.5); color: #fca5a5; border-radius: 6px; cursor: pointer; transition: all 0.15s ease; font-size: 12px;">
                Delete
              </button>
            </div>
          `;
        }).join("");

      } catch (err) {
        console.error("Error loading past imports:", err);
      }
    }

    // Delete a CSV import
    async function deleteImport(csvImportId) {
      if (!confirm("Delete this CSV upload and all its pitches? This cannot be undone.")) {
        return;
      }

      try {
        const token = localStorage.getItem("token");
        const response = await fetch(`/csv-import/${csvImportId}`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (data.success) {
          alert("✅ CSV import deleted!");
          loadPastImports(); // Reload the list
        } else {
          alert("❌ Error: " + data.error);
        }
      } catch (err) {
        console.error("Error deleting import:", err);
        alert("❌ Failed to delete import");
      }
    }

    // Update the upload form to reload past imports after successful upload
    const originalUploadCSV = uploadCSV;
    uploadCSV = async function() {
      await originalUploadCSV.call(this);
      setTimeout(loadPastImports, 2000);
    };
  </script>
</body>
</html>
