<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session Summary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js for velocity graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div id="summary-container">

    <h1>Session Summary</h1>

    <!-- Header -->
    <div id="summary-header">
        <p><strong>Pitcher:</strong> <span id="sumPitcher"></span></p>
        <p><strong>Total Pitches:</strong> <span id="sumTotal"></span></p>
        <p><strong>Total Strikes:</strong> <span id="sumStrikes"></span></p>
        <p><strong>Total Balls:</strong> <span id="sumBalls"></span></p>
        <p><strong>Outs:</strong> <span id="sumOuts"></span></p>
    </div>

    <!-- Velocity Graph -->
    <h2>Velocity Graph</h2>
    <canvas id="summaryVelocityChart"></canvas>

    <!-- Heatmap -->
    <h2>Heatmap</h2>
    <canvas id="summaryHeatmap"></canvas>

    <!-- Pitch List -->
    <h2>Pitches</h2>
    <div id="summaryPitchList"></div>

    <!-- PDF Button -->
    <button id="downloadPDFBtn" onclick="downloadPDF()">Download PDF</button>

</div>

<!-- Summary Logic -->
<script src="summary.js"></script>

</body>
</html>
