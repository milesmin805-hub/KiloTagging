<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Pitcher Profiles</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
</head>
<body>
  <!-- Header -->
  <div style="background: rgba(15, 23, 42, 0.95); padding: 20px; border-bottom: 1px solid rgba(148, 163, 184, 0.3); display: flex; justify-content: space-between; align-items: center;">
    <h1 style="color: #22d3ee; margin: 0;">All Pitcher Profiles</h1>
    <button onclick="window.location.href='/dashboard.html'" style="padding: 10px 16px; background: rgba(34, 211, 238, 0.2); border: 1px solid rgba(34, 211, 238, 0.5); color: #22d3ee; border-radius: 6px; cursor: pointer; font-weight: 600;">
      ← Back to Dashboard
    </button>
  </div>

  <!-- Loading -->
  <div id="loading" style="text-align: center; padding: 40px; color: #9ca3af;">
    Loading pitcher profiles...
  </div>

  <!-- Pitchers Grid -->
  <div id="pitchersContent" style="display: none; padding: 24px; background: rgba(15, 23, 42, 0.5);">
    <div id="pitchersGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <!-- Pitcher Profile Modal -->
  <div id="profileModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 2000; overflow-y: auto;">
    <button onclick="closeModal()" style="position: fixed; top: 20px; right: 20px; background: #ef4444; border: none; padding: 10px 16px; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; z-index: 2001;">
      ✕ Close
    </button>
    <div id="profileContent" style="max-width: 1400px; margin: 40px auto; padding: 0 16px;">
      <!-- Full pitcher profile loaded here -->
    </div>
  </div>

  <script>
    let allPitchers = [];

    window.addEventListener('load', loadAllPitchers);

    async function loadAllPitchers() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/all-pitchers?token=${token}`);
        const data = await response.json();

        if (!data.success) {
          document.getElementById('loading').innerHTML = `<p style="color: #ef4444;">Error: ${data.error}</p>`;
          return;
        }

        allPitchers = data.pitchers;
        renderPitchersGrid();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('pitchersContent').style.display = 'block';
      } catch (err) {
        console.error('Error loading pitchers:', err);
        document.getElementById('loading').innerHTML = `<p style="color: #ef4444;">Error loading pitchers</p>`;
      }
    }

    function renderPitchersGrid() {
      const grid = document.getElementById('pitchersGrid');
      grid.innerHTML = allPitchers.map(p => `
        <div onclick="viewPitcherProfile('${p.id}')" style="
          background: rgba(15, 23, 42, 0.9);
          border: 1px solid rgba(148, 163, 184, 0.3);
          border-radius: 12px;
          padding: 20px;
          cursor: pointer;
          transition: all 0.2s ease;
          text-align: center;
        " onmouseover="this.style.borderColor='rgba(34, 211, 238, 0.5)'; this.style.background='rgba(15, 23, 42, 0.95)';" onmouseout="this.style.borderColor='rgba(148, 163, 184, 0.3)'; this.style.background='rgba(15, 23, 42, 0.9)';">
          <div style="font-size: 16px; font-weight: 600; color: #22d3ee; margin-bottom: 8px;">
            ${p.name}
          </div>
          <div style="font-size: 13px; color: #e5e7eb; margin-bottom: 4px;">
            <strong>${p.pitcher_throws === 'Right' ? 'RHH' : 'LHH'}</strong>
          </div>
          <div style="font-size: 12px; color: #9ca3af;">
            ${p.team || 'No Team'}
          </div>
        </div>
      `).join('');
    }

function viewPitcherProfile(pitcherId) {
  window.location.href = `/pitcher-report.html?pitcherId=${pitcherId}&view=aggregated`;
}

    async function loadPitcherProfileData(pitcherId) {
      try {
        const token = localStorage.getItem('token');
        
        // Fetch aggregated metrics for this pitcher across all sessions
        const response = await fetch(`/pitcher-aggregated/${pitcherId}?token=${token}`);
        const data = await response.json();

        if (!data.success) {
          alert('Error loading profile: ' + data.error);
          return;
        }

        // Display in modal
        displayProfileModal(data.metrics);
        document.getElementById('profileModal').style.display = 'block';
      } catch (err) {
        console.error('Error loading profile:', err);
        alert('Error loading pitcher profile');
      }
    }

    function displayProfileModal(metrics) {
      const content = document.getElementById('profileContent');
      
      content.innerHTML = `
        <div style="background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 12px; padding: 32px;">
          <h1 style="color: #22d3ee; margin-top: 0;">${metrics.pitcherName}</h1>
          
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-bottom: 24px;">
            <div class="summary-box">
              <div class="summary-label">Throws</div>
              <div class="summary-value">${metrics.pitcherThrows === 'Right' ? 'RHH' : 'LHH'}</div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Total Pitches</div>
              <div class="summary-value">${metrics.totalPitches}</div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Peak Velo</div>
              <div class="summary-value">${metrics.peakVelo} mph</div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Strikeouts</div>
              <div class="summary-value">${metrics.advancedStats?.strikeouts || 0}</div>
            </div>
          </div>

          <div style="color: #9ca3af; font-size: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(148, 163, 184, 0.2);">
            ✓ Profile aggregated across all sessions
          </div>
        </div>
      `;
    }

    function closeModal() {
      document.getElementById('profileModal').style.display = 'none';
    }

    // Close modal on outside click
    document.getElementById('profileModal').addEventListener('click', (e) => {
      if (e.target.id === 'profileModal') {
        closeModal();
      }
    });
  </script>
</body>
</html>
